@(p : Project, dataset : Dataset, contentHtml : String)
@main(p.getName() + "", "profile") {
<!-- navigation -->
<nav class="">
	<div class="row">
		<div class="col s12">
			<a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
			<a href="@routes.ProjectsController.view(p.getId())" class="breadcrumb">@p.getName()</a>
			<a href="@routes.DatasetsController.view(dataset.getId())" class="breadcrumb">@dataset.getName()</a>
		</div>
	</div>
</nav>
<div class="row">
	<div class="col s12">
		@Html(contentHtml)
	</div>
</div>
}
