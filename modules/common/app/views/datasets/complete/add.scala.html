@(token : String, p : Project)
@main("Add existing dataset", "profile") {
  <!-- navigation -->
  <nav class="">
    <div class="row">
      <div class="col s12">
        <a href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
        <a href="@routes.ProjectsController.view(p.getId())" class="breadcrumb">@p.getName()</a>
        <a href="#" class="breadcrumb">Add existing dataset</a>
      </div>
    </div>
  </nav>

  <div class="row center">
    <div class="col s12">  
      <h2>Add Existing Dataset</h2>
    </div>
  </div>

  <div class="row">
    <form class="col s12" action="@api.routes.CompleteDSController.addMe(p.getId())" method="POST" onsubmit="return checkDate()">
      @elements.dataset.addFormElements(p, token)
    </form>    
  </div>
}
