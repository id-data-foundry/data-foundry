@(token : String, p : Project)
@main("Add annotation dataset", "profile") {
  <!-- navigation -->
  <nav class="">
    <div class="row">
      <div class="col s12">
        <a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
        <a href="@routes.ProjectsController.view(p.getId())" class="breadcrumb">@p.getName()</a>
        <a href="#" class="breadcrumb">Add annotation dataset</a>
      </div>
    </div>
  </nav>

  <div class="row center">
    <div class="col s12">  
        <h2>Add Annotation Dataset</h2>
    </div>
  </div>

  <div class="row">
    <form class="col s12" action="@api.routes.AnnotationDSController.addMe(p.getId())" method="POST" onsubmit="return checkDate()">
      @elements.dataset.addFormElements(p, token)
    </form>
  </div>
}
