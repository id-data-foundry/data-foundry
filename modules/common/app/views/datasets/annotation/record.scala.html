@(ds : Dataset, clusters: List[models.sr.Cluster])
@main("Form to add an annotation", "profile") {
    <!-- navigation -->
    <nav class="">
      <div class="row">
        <div class="col s12">
          <a href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
          <a href="@routes.ProjectsController.view(ds.getProject().getId())" class="breadcrumb">@ds.getProject().getName()</a>
          <a href="@routes.DatasetsController.view(ds.getId())" class="breadcrumb">@ds.getName()</a>
          <a href="#" class="breadcrumb">New Annotation</a>
        </div>
      </div>
    </nav>
    
    <div class="row center">
      <div class="col s12">
        <h2>Add new annotation</h2>
      </div>
    </div>
    
    <div class="row">
      <form class="col s12 m8 offset-m2" action="@api.routes.AnnotationDSController.record(ds.getId())" method="POST">
        <input name="test_form" value="true" type="hidden">
        <div class="row center">
          <div class="input-field col s12">
            <input id="title" name="title" type="text" class="">
            <label for="title">Title</label>
          </div>
          <div class="input-field col s12">
            <select name="cluster_id">
              @if(clusters.size() > 1) {
              <option value="-1" disabled selected>Choose your option</option>
              @for(c <- clusters) {
              <option value="@c.getRefId()">@c.getName()</option>
              }
              } else {
              @for(c <- clusters) {
              <option value="@c.getRefId()" selected>@c.getName()</option>
              }
              }
            </select>
            <label for="dsType">Choose a cluster</label>
          </div>
        </div>
        
        <div class="row center">
          <div class="input-field col s12">
            <textarea placeholder="Annotation text" id="text" name="text" type="text" class="materialize-textarea validate" required=""></textarea>
            <label for="text">Annotation text</label>
          </div>
        </div>
        <div class="row">
          <div class="input-field col s12 m6">
            <input id="ts-date" name="ts-date" type="text" class="datepicker">
            <label for="ts-date">Date</label>
          </div>
          <div class="input-field col s12 m6">
            <input id="ts-time" name="ts-time" type="text" class="timepicker">
            <label for="ts-time">Time</label>
          </div>
        </div>
        <div class="row">
          <div class="col s12 center">
            <div class="input-field center">
              <button class="btn" type="submit">Record</button>
            </div>
          </div>
        </div>
      </form>
      
    </div>
}
