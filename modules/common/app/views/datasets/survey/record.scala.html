@(token: String, invite_token: String, ds : Dataset)

@form("Data Foundry Survey") {
  <br><br>
  <form action="@api.routes.SurveyDSController.record(ds.getId(), invite_token)" method="POST">
    @Html(ds.getConfiguration().get("form_html_text"))
    <div style="padding-top: 3rem;">
      <input name="csrfToken" value="@token" type="hidden">
      <button class="btn" type="submit">Submit</button>
    </div>
  </form>
}
