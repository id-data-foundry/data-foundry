@(ds : Dataset)
@main("Dataset table view", "profile") {
	<link rel="stylesheet" media="screen" href="@routes.Assets.versioned("stylesheets/datatables.min.css")">
	<script src="@routes.Assets.versioned("javascripts/datatables.min.js")" type="text/javascript"></script>
	<script src="@routes.DatasetsController.jsRoutes()" type="text/javascript"></script>

	<style>
		.item {
			display: none;
		}
		.items a.active {
			color: black;
			text-decoration: underline;
		}
		.items a:hover {
			text-decoration: underline;
		}
	</style>

  <!-- navigation -->
  <nav class="">
    <div class="row">
      <div class="col s12">
        <a href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
        <a href="@routes.ProjectsController.view(ds.getProject().getId())" class="breadcrumb">@ds.getProject().getName()</a>
        <a href="@routes.DatasetsController.view(ds.getId())" id="backToDataset" class="breadcrumb">@ds.getName()</a>
        <a href="#" class="breadcrumb">Data table</a>
      </div>
    </div>
  </nav>

  <div class="row">
    <div class="col s12">
      @if(ds.getDsType() == models.DatasetType.IOT || ds.getDsType() == models.DatasetType.TIMESERIES) {
        <a href="@controllers.api.routes.TimeseriesDSController.tableTree(ds.getId())" class="btn right white black-text" style="margin-top: 2rem;">
            Tree View 🌳
        </a>
      }
      <h2>@ds.getName()</h2>
    </div>
  </div>

  <div class="row">  
  	<div class="col s12 items">
  		Retrieved
  		<a id="n-100" class="active" data="100">100</a>
  		<a id="n-1000" data="1000">1000</a>
  		<a id="n-all" data="-1">all</a>
  		items.
  		<br>
      <div class="progress">
        <div class="indeterminate"></div>
      </div>
  	</div>
	  <div class="col s12" id="container">
			<table id="datatable"></table>
    </div>
  </div>

  <script type="text/javascript">  	
		$(document).ready(function() {
			
			var data = [];
			var headers;
			var table;

			document.querySelectorAll('.items a').forEach((d) => {
				d.addEventListener('click', () => {
					downloadData(parseInt(d.getAttribute('data')));
					document.querySelectorAll('.items a').forEach((d) => { d.classList.remove('active') })
					d.classList.add('active')
				})
			})

			function downloadData(limit = 100) {
				document.querySelector('#container').innerHTML = '<table id="datatable"></table>';
				document.querySelector('.progress').style.display = 'block';
				let r = jsRoutes.controllers.DatasetsController.downloadJson(@ds.getId(), limit);
	        $.ajax({
	    		url: r.url,
	    		type: r.type,
	    		success: function(json) {
	    			if(json.length == 0) {
	    				data = [];
	    				return;
	    			} else {
	      			temp = json;
	      			headers = ["id", "ts", "pp1", "pp2", "pp3"@for(s <- ds.configuration(Dataset.DATA_PROJECTION, "").split(",")) {, "@s"}];
							data = [];
							temp.forEach(function(d, i) {
								row = []
								headers.map(function(k){
									row.push(d[k] === Object(d[k]) ? JSON.stringify(d[k]) : (d[k] === undefined ? "" : d[k]))
								})
								data.push(row)
							});
	    			}

						// fill table with data
						let input = {
							data: data,
	       			columns: [],
	       			select: {
								style: 'single'
							},
							pageLength: 15
				    };
						headers.forEach(function(d,i) {
							input.columns.push({"title": d});
						});

						table = $('#datatable').DataTable(input);
						document.querySelector('.progress').style.display = 'none';
						document.querySelector('.items').style.display = (data.length >= 100) ? 'block' : 'none';
	        },
	        error: function() {}
	      });
			}
			// always start with just 100 items
			downloadData(100);
		});
	</script>
}
