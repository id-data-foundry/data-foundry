@(dataset: Dataset, participants: List[sr.Participant], user : String)(implicit request: Http.Request)
@main("View dataset", "profile") {
  <script src='@routes.Assets.versioned("javascripts/vega.min.js")' type="text/javascript"></script>
  @elements.dataset.datasetTitlebar(dataset, user) {
    <a href="@dataset.getTargetObject()" class="btn">Link</a>    
  }
  @elements.dataset.config.standard(dataset, user)
}
