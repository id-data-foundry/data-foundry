@()
@main("QR Code Generator", "tools") {
	<!-- navigation -->
	<nav class="">
		<div class="row">
			<div class="col s12">
				<a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
				<a href="#" class="breadcrumb">QR Code Generator</a>
			</div>
		</div>
	</nav>

	<div class="row">
		<div class="col s12">
			<h3>
				QR Code Generator
			</h3>
		</div>
	</div>

	<div class="row">
		<div class="col s12">
			Enter a URL into the text field and click "Generate" to make the QR code.
		</div>
		<div class="col s12 input-field">
			<input name="url" id="url" placeholder="https://example.com">
		</div>
		<div class="col s12">
			<button id="submitBtn" class="btn">Generate</button>
		</div>
	</div>

	<div class="row">
		<div class="col s12" id="qrcode">
		</div>
	</div>

	<script type="text/javascript">
		let currentURL = '';
		document.querySelector('#submitBtn').addEventListener('click', () => {
			let url = document.querySelector('#url').value;
			if(url.length > 4 && currentURL != url) {
				currentURL = url;
				document.querySelector('#qrcode').innerHTML = `<img src="/qr/code/${url}">`
			}
		})
	</script>
}
