@(models: List[services.api.ai.LocalModelMetadata.ModelMetadata])
@main("AI Models", "documentation") {
	<nav class="">
		<div class="row">
			<div class="col s12">
				<a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
				<a href="#!" class="breadcrumb">AI Models</a>
			</div>
		</div>
	</nav>

	<div class="row">
		<div class="col s12">
			<h3>Local AI Models</h3>
		</div>

		@for(model <- models) {
		<div class="col s12" style="margin: 1rem 0;">
			id: <code>@model.id()</code>
			<br>
			name: @model.name()
			<br>
			link: <a href="@model.link()" target="_blank">website</a>
			<br>
			@if(!model.description().equals("<description>")) {
			<details>
				<summary>Description</summary>
				@model.description()
			</details>
			}
		</div>
		}
	</div>
}
