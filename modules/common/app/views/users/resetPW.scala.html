@(token : String, usernameAsToken : String)

@external("Reset password") {

  <nav class="">
    <div class="row">
      <div class="col s12">
        <a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
        <a href="@routes.UsersController.edit()" class="breadcrumb">Reset password</a>
      </div>
    </div>
  </nav>

  <div class="row center">
    <div class="col s12">
      <h2>Edit profile</h2>
    </div>
  </div>

  <div class="row">
    <form class="col s12" action="@routes.UsersController.resetPWMe(usernameAsToken)" method="POST">

      <div class="row">
        <div class="input-field col s6">
          <input id="password" placeholder="new password" name="password" type="password" autocomplete="new-password" class="validate" required="">
          <label for="password">Password</label>
        </div>
        <div class="input-field col s6">
          <input id="re_password" placeholder="new password again" name="re_password" type="password" autocomplete="new-password" class="validate" required="">
          <label for="re_password">Type password again</label>
        </div>
      </div>

      <input type="hidden" name="csrfToken" value="@token"/>
      
      <div class="row">
        <div class="col s12">
          <div class="input-field center">
          <button class="btn" type="submit">save</button>
          </div>
        </div>
      </div>
    </form>
    
  </div>
}
