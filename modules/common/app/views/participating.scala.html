@(title: String, token: String, language: String = "en")(content: Html)
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#81c784">
        <title>@title</title>
        <link rel="stylesheet" media="screen" href="@routes.Assets.versioned("stylesheets/main.css")">
        <link rel="shortcut icon" type="image/png" href="@routes.Assets.versioned("images/favicon.png")">
        <style type="text/css">
            
            th {
                width: 20%;
                text-align: center;
            }

            .container {
                margin: 0 auto;
            }

            .container p + div {
                margin-top: 0;
                padding-top: 0;
            }

            .container p {
                margin-bottom: 0;
                padding-bottom: 0;
            }

        </style>
    </head>
    <body>
        <div class="container">
            <nav class="">
                <div class="row">
                  <div class="col s12">
                    @if(!title.isEmpty && !token.isEmpty) {
                    @if(language.equals("nl")) {
                    <a id="homeBtn" href="@routes.ParticipationController.view(token)" class="breadcrumb">Startpagina</a>    
                    } else {
                    <a id="homeBtn" href="@routes.ParticipationController.view(token)" class="breadcrumb">Home</a>
                    }
                    <a href="#" class="breadcrumb">@title</a>
                    }
                  </div>
                </div>
            </nav>

        @content
        </div>

        @elements.footer()
    </body>
    <script src="@routes.Assets.versioned("javascripts/jquery.min.js")" type="text/javascript"></script>
    <script src="@routes.Assets.versioned("javascripts/materialize.min.js")" type="text/javascript"></script>
    <script src="@routes.Assets.versioned("javascripts/common.min.js")" type="text/javascript"></script>
</html>
