@(dataset: Dataset, choice: String, itemRange: String)
<div class="">
	<div id="vis_@choice"></div>
	<script type="text/javascript">

		// vega lite spec
	   var vlSpec_@(choice) = {
	        $schema: 'https://vega.github.io/schema/vega-lite/v4.json',
	        width: 400,
	        height: 200,
	        data: {
	          "url": "@routes.DatasetsController.download(dataset.getId())",
	          "format": { "type": "csv"}
	        },
	        transform: [
	        	{
	        		calculate: "split(datum['@choice'], ',')",
	        		as: "Option"
	        	},
	        	{
	        		flatten: ["Option"]
	        	}
	        ],
	        mark: "bar",
			encoding: {
		        "x": {
		          "field": "Option",
		          "scale": {"domain": [@Html(itemRange)]},
		          "type": "nominal",
                  "axis": {"title": ""}
		        },
		        "y": {
		        	"aggregate": "count",
		        	"type": "quantitative"
		        },
		        "color": {
		          "field": "Option",
		          "scale": {"domain": [@Html(itemRange)]},
		          "type": "nominal",
		          "legend": {
		          	"title": ""
				  }
		        },
			}
	      };
	    var view_@(choice);
	    vegaEmbed('#vis_@choice', vlSpec_@choice).then(function(vega) {
				view_@(choice) = vega.view;
		});
	</script>
</div>
