@(token : String, p : Project, dsList : List[Dataset], participantId : Long)

@main("Add wearable") {

  <!-- navigation -->
  <nav class="">
    <div class="row">
      <div class="col s12">
        <a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
        <a href="@routes.ProjectsController.view(p.getId())" class="breadcrumb">@p.getName()</a>
        <a href="@routes.ProjectsController.viewResources(p.getId())" class="breadcrumb">Sources</a>
        <a href="#" class="breadcrumb">Add new wearable</a>
      </div>
    </div>
  </nav>
      
  @elements.sources.wearable.addForm(token, p, dsList, "GOOGLEFIT", participantId)
    
  @elements.popupDialog()

}
