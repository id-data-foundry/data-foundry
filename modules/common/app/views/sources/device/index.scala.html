@(devices: List[sr.Device], updates: Map[Long, Long])
@if(devices.isEmpty) {
  There are no devices registered in the project.
} else {
<table id="devices"></table>
<script type="text/javascript">
  	(function() {
      let data = [
  		@for(d <- devices) { [
  			{ name: "@d.getName()", id: @d.getId() },
  			"@d.getRefId()", "@d.getCategory()", "@d.getPublicParameter1()", "@d.getPublicParameter2()", "@d.getPublicParameter3()", "@{utils.DateUtils.pretty(updates.get(d.getId()))}"
  			],
  		}
  	  ];

      let input = {
        data: data,
        columns: [{
          width: "12rem",
          title: "Device",
          render: function(d) {
            return `<a href="@routes.DevicesController.view(1337)"><b style="white-space: nowrap;">${d.name}</b></a>`.replace("1337", d.id)
          }
        },
        { 
          title: "ID",
        },
        { 
          title: "Category",
        },
        {
          title: "PP1",
        },
        {
          title: "PP2",
        },
        {
          title: "PP3",
        },
        {
          title: "Last data",
        }],
        searching: false,
        select: false,
        ordering: true,
        paging: data.length > 10,
        info: false
      };

      let table = $('#devices').DataTable(input);
    })();
</script>
}
