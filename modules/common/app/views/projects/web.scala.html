@(p : Project, contentHtml: String)

@main(p.getName() + "") {

		<!-- navigation -->
		<nav class="">
			<div class="row">
				<div class="col s12">
					<a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
					<a href="@routes.ProjectsController.view(p.getId())" class="breadcrumb">@p.getName()</a>
				</div>
			</div>
		</nav>

		<!-- project info -->
		<div class="row">
			<div class="col s12">
				@Html(contentHtml)
			</div>
		</div>

}
