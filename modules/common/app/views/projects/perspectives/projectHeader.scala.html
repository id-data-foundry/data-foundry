@(p : Project, user: Person)

<!-- navigation -->
<nav class="">
	<div class="row">
		<div class="col s12">
			<a id="homeBtn" href="@routes.ProjectsController.index()" class="breadcrumb">Home</a>
			<a href="#" class="breadcrumb">@p.getName()</a>
		</div>
	</div>
</nav>

<!-- project header -->
<div class="row">
	<div class="col s12">
		<h3 id="projectName" style="display: inline-block;">@p.getName() @if(p.isFrozen()){🧊}</h3>
		@if(!p.isFrozen()) {
		@if(p.belongsTo(user)){
		<a class="btn white-text" id="editButton" style="float: right; font-size: 1rem; margin-top: 1.5rem;" href="@routes.ProjectsController.edit(p.getId())">
			@elements.icon("edit")
			Edit
		</a>
		@*
			@if(p.metadataCompleteness() < 100) {
			<span class="tooltipped" data-tooltip="This project is @{p.metadataCompleteness()}% complete.<br>Get to 100% by adding information to project and dataset metadata.">
				<i class="btn-edit">@elements.icon("timelapse")</i>
			</span>
			}
		*@
		}
		}
	</div>
</div>
