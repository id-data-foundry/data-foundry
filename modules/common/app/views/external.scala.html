@(title: String)(content: Html)
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#81c784">
        <title>Data Foundry @title</title>
        <link rel="shortcut icon" type="image/png" href="@routes.Assets.versioned("images/favicon.png")">
        <link rel="stylesheet" media="screen" href="@routes.Assets.versioned("stylesheets/external.css")">
        <script src="@routes.Assets.versioned("javascripts/materialize.min.js")" type="text/javascript"></script>
        <script src="@routes.Assets.versioned("javascripts/jquery.min.js")" type="text/javascript"></script>
        <script src="@routes.Assets.versioned("javascripts/htmx.min.js")" type="text/javascript"></script>
    </head>
    <body>
        <div class="container">
        @content
        </div>
  		@elements.footer()
    </body>
    <script type="text/javascript">
        window.addEventListener('DOMContentLoaded', () => {
            if(document.location.hash.length == 0) {
                $('.container form input:visible').eq(0).focus();
            }
        });
    </script>
    <script src="@routes.HomeController.getExtFlashes()" type="text/javascript"></script>
</html>
