@(title: String)(content: Html)

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#81c784">
        <title>@title</title>
        <link rel="stylesheet" media="screen" href="@routes.Assets.versioned("stylesheets/chartist.css")">
        <link rel="shortcut icon" type="image/png" href="@routes.Assets.versioned("images/favicon.png")">
    </head>
    <body>
        <div class="container">
        @content
        </div>
    </body>
    <script src="@routes.Assets.versioned("javascripts/hyperscript.min.js")" type="text/javascript"></script>
    <script src="@routes.Assets.versioned("javascripts/chartist.min.js")" type="text/javascript"></script>
    <script src="@routes.Assets.versioned("javascripts/chartist-plugin-legend.js")" type="text/javascript"></script>
</html>
