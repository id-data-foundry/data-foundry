swagger: "2.0"
info: 
  title: "Data Foundry API"
  description: "Data Foundry API"
  version: "2.0.0"
  contact:
    email: "m.funk@tue.nl"
basePath: "/api/v2"
consumes:
  - application/json
produces: 
  - application/json
securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: X-API-Key
  ApiTokenAuth:
    type: apiKey
    in: header
    name: X-API-Token
security:
  - ApiKeyAuth: []
  - ApiTokenAuth: []